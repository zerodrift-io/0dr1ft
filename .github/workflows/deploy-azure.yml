name: Deploy — Azure Container Apps (0dr1ft)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'extensions/**'
      - 'skills/**'
      - 'packages/**'
      - 'Dockerfile'
      - 'infra/azure/**'
      - '0dr1ft.mjs'

env:
  ACR_NAME: 0dr1ftacr
  IMAGE_NAME: 0dr1ft
  RESOURCE_GROUP: 0dr1ft-rg
  APP_NAME: 0dr1ft

jobs:
  # ── Docker lint — fast gate, avoids running full OpenClaw CI (iOS/macOS/Android) ──
  docker-check:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3016,DL3018,DL3028

  build-and-deploy:
    name: Build & Deploy to Azure
    runs-on: ubuntu-latest
    needs: [docker-check]

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image on ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --file Dockerfile .

      - name: Deploy to Container Apps (preserve volume mounts)
        run: |
          # Update image while preserving the Azure Files volume mount
          # at /app/data for config/session persistence across restarts
          cat > /tmp/containerapp-update.yaml <<EOF
          properties:
            template:
              volumes:
                - name: 0dr1ftdata
                  storageName: 0dr1ftfiles
                  storageType: AzureFile
              containers:
                - name: 0dr1ft
                  image: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
                  resources:
                    cpu: 0.5
                    memory: 1Gi
                  env:
                    - name: OPENCLAW_GATEWAY_TOKEN
                      value: "${{ secrets.OPENCLAW_GATEWAY_TOKEN }}"
                    - name: NODE_ENV
                      value: "production"
                  volumeMounts:
                    - volumeName: 0dr1ftdata
                      mountPath: /app/data
          EOF

          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yaml /tmp/containerapp-update.yaml

      - name: Verify deployment
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "Deployed to: https://$FQDN"
          echo "DEPLOYMENT_URL=https://$FQDN" >> $GITHUB_ENV
          # Give the container time to start
          sleep 30
          curl -f "https://$FQDN/api/health" || echo "Warning: health check pending (container may still be starting)"

      - name: Post deployment URL to summary
        run: |
          echo "## 0dr1ft Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ env.DEPLOYMENT_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
